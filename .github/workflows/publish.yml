name: Publish to npm

# n8n verified community nodes MUST be published via GitHub Actions with an
# npm provenance statement (hard requirement since May 1 2026) — a local
# `npm publish` disqualifies the package from Creator Portal verification.
#
# This workflow is committed CI-ready ahead of the gate (D-58): it cannot run
# until this package lives in its own GitHub repository with an NPM_TOKEN
# secret configured. Trigger: publish a GitHub release (or run manually).

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
